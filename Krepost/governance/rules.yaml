# Правила гейтинга улучшений Крепости
# Все изменения проходят через оператора

gate:
  enabled: true
  fail_closed: true  # Если гейт недоступен — блокировать изменения

  rules:
    - name: "Обязательное одобрение"
      description: "Любое улучшение требует явного одобрения оператора"
      enforce: always

    - name: "Полный список изменений"
      description: "Каждое предложение содержит полный список файлов и компонентов"
      enforce: always

    - name: "Уведомление оператора"
      description: "Оператор получает уведомление о новом предложении"
      enforce: always

    - name: "Аудит решений"
      description: "Каждое решение (одобрить/отклонить/доработать) логируется"
      enforce: always

  statuses:
    pending: "⏳ Ожидает одобрения"
    approved: "✅ Одобрено"
    rejected: "❌ Отклонено"
    revision: "🔄 На доработке"
    integrated: "📦 Интегрировано"

  workflow:
    1: "Агент создаёт предложение в папке предложения/"
    2: "Предложение включает: описание, файлы, зависимости, риски"
    3: "Оператор получает уведомление"
    4: "Оператор читает и выносит решение"
    5: "Только предложения со статусом APPROVED интегрируются"
    6: "Все решения записываются в audit_log"

  categories:
    - security      # Безопасность пайплайна
    - memory        # Системы памяти
    - monitoring    # Мониторинг и алертинг
    - inference     # Инференс и модели
    - intelligence  # Threat intelligence
    - testing       # Тестирование и бенчмарки
    - architecture  # Архитектурные изменения
